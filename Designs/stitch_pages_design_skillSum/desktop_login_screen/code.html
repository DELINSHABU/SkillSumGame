<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SkillSum 2.0 - Welcome Back!</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "surface-container-low": "#f9f2f5",
                        "surface-variant": "#e8e0e3",
                        "primary-fixed-dim": "#ffb1c7",
                        "on-secondary-fixed": "#2f1500",
                        "on-error": "#ffffff",
                        "secondary-container": "#fd983a",
                        "on-tertiary-fixed-variant": "#005046",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .dot-grid {
            background-image: radial-gradient(#dbc0c6 1.5px, transparent 1.5px);
            background-size: 32px 32px;
            opacity: 0.15;
        }
        .soft-arcade-shadow {
            box-shadow: 0 24px 48px -12px rgba(162, 55, 96, 0.08);
        }
        .pressable-3d-button {
            box-shadow: 0 4px 0 #77133f;
            transition: all 0.1s ease-out;
        }
        .pressable-3d-button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #77133f;
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface selection:bg-primary-container selection:text-on-primary-container min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
<!-- Background Texture -->
<div class="absolute inset-0 dot-grid pointer-events-none"></div>
<!-- Floating Decorative Elements -->
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary-container/20 rounded-full blur-3xl"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-tertiary-container/20 rounded-full blur-3xl"></div>
<!-- Auth Card Container -->
<div class="relative w-full max-w-[480px]">
<!-- Top Arcade Decoration -->
<div class="absolute -top-6 left-1/2 -translate-x-1/2 flex gap-3 z-10">
<div class="w-12 h-3 bg-secondary-container rounded-full"></div>
<div class="w-3 h-3 bg-tertiary-container rounded-full"></div>
<div class="w-3 h-3 bg-primary-container rounded-full"></div>
</div>
<div class="bg-surface-container-lowest rounded-xl p-10 md:p-14 soft-arcade-shadow relative z-0 border border-outline-variant/10">
<!-- Brand Identity -->
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 bg-gradient-to-br from-primary to-primary-container rounded-lg flex items-center justify-center mb-6 shadow-[0_6px_0_#831e48]">
<span class="material-symbols-outlined text-on-primary text-4xl" data-icon="school">school</span>
</div>
<h1 class="font-headline text-4xl md:text-5xl font-extrabold tracking-tight text-center text-primary leading-tight">
                    Welcome Back!
                </h1>
<p class="text-on-surface-variant mt-3 text-center font-medium">
                    Ready to level up your skills today?
                </p>
</div>
<!-- Login Form -->
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label text-sm font-bold uppercase tracking-widest text-on-surface-variant ml-2">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-outline" data-icon="alternate_email">alternate_email</span>
<input class="w-full pl-14 pr-6 py-4 bg-surface-container-low border-none rounded-lg font-body focus:ring-4 focus:ring-primary-container/30 transition-all text-on-surface placeholder:text-outline-variant" placeholder="hero@skillsum.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-2">
<label class="block font-label text-sm font-bold uppercase tracking-widest text-on-surface-variant">Password</label>
<a class="font-label text-xs font-bold text-primary hover:text-primary-container transition-colors" href="#">Forgot Secret?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full pl-14 pr-6 py-4 bg-surface-container-low border-none rounded-lg font-body focus:ring-4 focus:ring-primary-container/30 transition-all text-on-surface placeholder:text-outline-variant" placeholder="••••••••••••" type="password"/>
</div>
</div>
<!-- Login Button -->
<button class="pressable-3d-button w-full py-5 bg-gradient-to-br from-primary to-primary-container rounded-lg font-headline font-extrabold text-xl text-on-primary flex items-center justify-center gap-3 mt-8" type="submit">
<span>Login</span>
<span class="material-symbols-outlined" data-icon="rocket_launch">rocket_launch</span>
</button>
</form>
<!-- Social Divider -->
<div class="relative my-10 flex items-center">
<div class="flex-grow h-px bg-outline-variant/30"></div>
<span class="px-4 font-label text-xs font-bold text-outline uppercase tracking-tighter">Or continue with Google</span>
<div class="flex-grow h-px bg-outline-variant/30"></div>
</div>
<!-- Google Login -->
<button class="w-full py-4 border-2 border-outline-variant/20 rounded-lg flex items-center justify-center gap-3 hover:bg-surface-container-low transition-all active:scale-[0.98]">
<img alt="Google" class="w-6 h-6" data-alt="Official Google G-logo icon in its brand colors on a transparent background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCCWKIQv4mKctGdnvBMu8uxvN3q7oZnZLnpjqTpoHUrCl_3_UZjlqxIcE13KU_K7PtGo608WuXiDWrsjwnBOfccVlNlZnJ1KOgal6Z4Hk2hljHl0zzuu88B7NvjcxizB0CIYnNerDBxDwNoi5_ntLNJPb3ZkjvX__x9X0dY3rHG6zXNgh69QN5nQSx07X_uTKODFQTPE8vS_5LVbr1VtDs9LpYbWeyxkCRxHKDbbFtrwg47JCK5FOGhO54jiCPABv-DU3zzMCcjK2wM"/>
<span class="font-body font-semibold text-on-surface-variant">Google Arcade ID</span>
</button>
<!-- Footer Link -->
<div class="mt-10 text-center">
<p class="text-on-surface-variant font-medium">
                    New to the arena? 
                    <a class="text-primary font-bold hover:underline underline-offset-4 decoration-primary-container" href="#">Create an account</a>
</p>
</div>
</div>
<!-- Extra Decorative Arcade Badge -->
<div class="absolute -right-16 top-1/3 rotate-12 hidden lg:block">
<div class="bg-tertiary-container p-4 rounded-xl shadow-lg border-4 border-surface-container-lowest">
<span class="material-symbols-outlined text-on-tertiary-container text-4xl" data-icon="hotel_class">hotel_class</span>
</div>
</div>
<div class="absolute -left-12 bottom-12 -rotate-12 hidden lg:block">
<div class="bg-secondary-container p-4 rounded-xl shadow-lg border-4 border-surface-container-lowest">
<span class="material-symbols-outlined text-on-secondary-container text-4xl" data-icon="local_fire_department">local_fire_department</span>
</div>
</div>
</div>
<!-- Terms and Privacy Footer (Discreet) -->
<div class="absolute bottom-6 left-0 w-full text-center px-6">
<p class="text-[10px] font-label font-bold text-outline-variant uppercase tracking-widest">
            SkillSum Arcade v2.0 • Est. 2024 • Privacy Mastery &amp; Terms of Play
        </p>
</div>
</body></html>
