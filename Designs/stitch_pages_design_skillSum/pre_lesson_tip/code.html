<!-- TopAppBar (Suppressed for focused task, but following JSON structure for header content) -->
<header class="w-full top-0 sticky bg-gradient-to-b from-[#fff7fa] to-transparent z-40">
<div class="flex justify-between items-center w-full px-6 py-4">
<div class="flex items-center gap-3">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-lowest text-primary hover:opacity-80 transition-opacity active:scale-95 duration-150">

</button>

</div>
<div class="flex items-center gap-2 px-4 py-2 bg-surface-container-lowest rounded-full">
<span class="text-[#a23760] font-extrabold font-headline">7 🔥</span>
</div>
</div>
</header>
<main class="max-w-2xl mx-auto px-6 pb-32 relative">
<!-- Dot Grid Background for Depth -->
<div class="fixed inset-0 dot-grid pointer-events-none"></div>
<!-- Header Section -->
<div class="relative mt-4 mb-8 text-center">
<div class="inline-block px-6 py-2 bg-tertiary-fixed text-on-tertiary-fixed rounded-full font-label text-sm font-bold mb-4 shadow-sm">
        LEVEL 7
      </div>
<h1 class="text-4xl font-headline font-extrabold text-on-surface leading-tight tracking-tight">
        💡 Today's Trick
      </h1>
<p class="text-on-surface-variant font-medium mt-2">Mastering 'The Adding 9 Trick'</p>
</div>
<!-- Main Example Card -->
<div class="bg-surface-container-lowest rounded-xl p-10 mb-8 relative overflow-hidden shadow-[0_24px_48px_-12px_rgba(162,55,96,0.08)]">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary-container opacity-10 rounded-bl-full"></div>
<div class="relative flex flex-col items-center justify-center">
<span class="font-label text-xs font-bold text-primary mb-4 tracking-widest">THE CHALLENGE</span>
<div class="text-6xl font-headline font-extrabold text-primary tracking-tighter">
          34 + 9 = ?
        </div>
</div>
</div>
<!-- Step-by-Step Breakdown (Asymmetric Layout) -->
<div class="space-y-6 mb-12">
<!-- Step 1 -->
<div class="flex gap-6 items-start">
<div class="flex-shrink-0 w-14 h-14 rounded-full bg-secondary-container flex items-center justify-center relative shadow-sm">
<span class="font-label font-bold text-on-secondary-container">01</span>
<div class="absolute inset-0 rounded-full gloss-overlay"></div>
</div>
<div class="flex-grow pt-2">
<h3 class="font-headline font-bold text-lg text-on-surface">Step 1: Add 10 instead</h3>
<div class="mt-2 p-5 bg-surface-container-low rounded-lg font-label text-xl font-bold text-on-surface-variant">
            34 + <span class="text-secondary">10</span> = <span class="text-on-surface">44</span>
</div>
</div>
</div>
<!-- Step 2 -->
<div class="flex gap-6 items-start translate-x-4">
<div class="flex-shrink-0 w-14 h-14 rounded-full bg-tertiary-container flex items-center justify-center relative shadow-sm">
<span class="font-label font-bold text-on-tertiary-container">02</span>
<div class="absolute inset-0 rounded-full gloss-overlay"></div>
</div>
<div class="flex-grow pt-2">
<h3 class="font-headline font-bold text-lg text-on-surface">Step 2: Then minus 1</h3>
<div class="mt-2 p-5 bg-surface-container-low rounded-lg font-label text-xl font-bold text-on-surface-variant">
            44 - <span class="text-tertiary">1</span> = <span class="text-primary">43</span>
</div>
</div>
</div>
</div>
<!-- Star Targets / Progress Stats -->
<div class="bg-surface-container rounded-xl p-8 mb-12">
<h4 class="font-label text-xs font-bold text-on-surface-variant text-center mb-6 tracking-widest uppercase">Target Scores</h4>
<div class="flex justify-around items-end h-24 gap-4">
<div class="flex flex-col items-center gap-2 flex-1">
<span class="material-symbols-outlined text-secondary-fixed-dim text-3xl">star</span>
<div class="w-full bg-surface-container-lowest rounded-t-lg h-8 flex items-center justify-center font-label font-bold text-on-surface">8</div>
</div>
<div class="flex flex-col items-center gap-2 flex-1">
<div class="flex gap-0.5">
<span class="material-symbols-outlined text-secondary-container text-3xl">star</span>
<span class="material-symbols-outlined text-secondary-container text-3xl">star</span>
</div>
<div class="w-full bg-surface-container-lowest rounded-t-lg h-12 flex items-center justify-center font-label font-bold text-on-surface">12</div>
</div>
<div class="flex flex-col items-center gap-2 flex-1">
<div class="flex gap-0.5">
<span class="material-symbols-outlined text-secondary text-4xl" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-secondary text-4xl" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-secondary text-4xl" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
<div class="w-full bg-surface-container-lowest rounded-t-lg h-16 flex items-center justify-center font-label font-bold text-on-surface">16</div>
</div>
</div>
</div>

<div class="absolute inset-0 bg-primary/20 mix-blend-multiply"></div>
<div class="absolute inset-0 flex items-center justify-center">
<div class="bg-surface-container-lowest/90 backdrop-blur-md px-6 py-3 rounded-full border border-white/20 shadow-xl">
<p class="font-headline font-bold text-primary">Think: 9 is almost 10!</p>
</div>
</div>
</div>
