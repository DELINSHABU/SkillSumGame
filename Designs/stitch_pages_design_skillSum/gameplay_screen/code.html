<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SkillSum 2.0 - Gameplay</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;family=Space+Grotesk:wght@500;700&amp;family=Nunito:wght@800;900&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface": "#1e1b1d",
                    "error": "#ba1a1a",
                    "surface": "#fff7fa",
                    "on-tertiary-container": "#00473e",
                    "error-container": "#ffdad6",
                    "primary-fixed-dim": "#ffb1c7",
                    "on-primary-fixed-variant": "#831e48",
                    "on-secondary-fixed": "#2f1500",
                    "background": "#fff7fa",
                    "outline": "#887177",
                    "on-error-container": "#93000a",
                    "primary": "#a23760",
                    "on-surface-variant": "#554247",
                    "primary-fixed": "#ffd9e2",
                    "on-tertiary": "#ffffff",
                    "on-error": "#ffffff",
                    "primary-container": "#ff80ab",
                    "surface-container-highest": "#e8e0e3",
                    "surface-container-high": "#eee6e9",
                    "secondary-fixed": "#ffdcc3",
                    "inverse-surface": "#332f32",
                    "tertiary-fixed": "#6bf9e1",
                    "tertiary-container": "#11bea8",
                    "tertiary-fixed-dim": "#49dcc5",
                    "surface-tint": "#a23760",
                    "inverse-primary": "#ffb1c7",
                    "on-tertiary-fixed": "#00201b",
                    "secondary": "#904d00",
                    "on-secondary": "#ffffff",
                    "on-primary-fixed": "#3e001c",
                    "on-secondary-container": "#693600",
                    "on-secondary-fixed-variant": "#6e3900",
                    "surface-bright": "#fff7fa",
                    "surface-variant": "#e8e0e3",
                    "on-tertiary-fixed-variant": "#005046",
                    "outline-variant": "#dbc0c6",
                    "surface-container": "#f4ecef",
                    "on-primary": "#ffffff",
                    "on-background": "#1e1b1d",
                    "surface-container-low": "#f9f2f5",
                    "surface-dim": "#dfd8db",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-container": "#77133f",
                    "inverse-on-surface": "#f7eff2",
                    "tertiary": "#006b5e",
                    "secondary-fixed-dim": "#ffb77d",
                    "secondary-container": "#fd983a"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Be Vietnam Pro"],
                    "label": ["Space Grotesk"],
                    "arcade": ["Nunito"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .dot-grid {
            background-image: radial-gradient(#dbc0c6 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            opacity: 0.15;
        }
        .pressable-btn {
            transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .pressable-btn:active {
            transform: translateY(4px);
            box-shadow: none !important;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(24px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body min-h-screen overflow-hidden select-none">
<!-- Background Texture -->
<div class="fixed inset-0 dot-grid pointer-events-none"></div>
<!-- Top Navigation Area -->
<header class="relative z-10 w-full px-6 py-4 flex justify-between items-center bg-[#fff7fa] dark:bg-pink-950/20 bg-[radial-gradient(circle,_#ff80ab15_1px,_transparent_1px)] [background-size:20px_20px]">
<div class="flex items-center gap-3">
<button class="w-12 h-12 flex items-center justify-center bg-surface-container-lowest rounded-full shadow-[0_4px_0_#e8e0e3] hover:scale-105 active:scale-95 transition-all text-primary">
<span class="material-symbols-outlined">pause</span>
</button>
<div class="flex flex-col">
<span class="font-headline tracking-tight font-extrabold text-lg uppercase text-[#a23760]">Level 42 • The Flow</span>
<span class="font-label text-xs font-bold text-primary/60">World 1 · Lv7</span>
</div>
</div>
<!-- Circular Timer -->
<div class="relative w-14 h-14 flex items-center justify-center">
<svg class="absolute inset-0 w-full h-full -rotate-90">
<circle class="text-surface-container-high" cx="28" cy="28" fill="transparent" r="24" stroke="currentColor" stroke-width="4"></circle>
<circle class="text-primary-container" cx="28" cy="28" fill="transparent" r="24" stroke="currentColor" stroke-dasharray="150" stroke-dashoffset="40" stroke-width="4"></circle>
</svg>
<span class="font-label font-bold text-sm text-on-primary-container">37s</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="relative z-10 flex flex-col items-center px-6 pt-2 pb-8 max-w-md mx-auto h-[calc(100vh-88px)]">
<!-- Star Progress Bar -->
<div class="w-full mb-12">
<div class="relative h-4 bg-surface-container-high rounded-full w-full overflow-visible">
<!-- Progress Fill -->
<div class="absolute left-0 top-0 h-full bg-gradient-to-r from-primary to-primary-container rounded-full" style="width: 70%;"></div>
<!-- Markers -->
<div class="absolute inset-0 flex justify-between items-center px-0">
<div class="absolute left-[50%] -translate-x-1/2 flex flex-col items-center -top-6">
<span class="material-symbols-outlined text-secondary text-xl" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="font-label text-[10px] font-bold text-on-surface-variant">8</span>
</div>
<div class="absolute left-[75%] -translate-x-1/2 flex flex-col items-center -top-6">
<span class="material-symbols-outlined text-secondary text-xl" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="font-label text-[10px] font-bold text-on-surface-variant">12</span>
</div>
<div class="absolute left-[100%] -translate-x-full flex flex-col items-center -top-6">
<span class="material-symbols-outlined text-secondary text-xl" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="font-label text-[10px] font-bold text-on-surface-variant">16</span>
</div>
</div>
</div>
</div>
<!-- Question Section -->
<div class="flex-1 flex flex-col items-center justify-center w-full mb-6">
<div class="text-center mb-8">
<h2 class="font-arcade text-6xl md:text-7xl font-black text-on-surface tracking-tight mb-6">
                    47 + 9 = ?
                </h2>
<div class="flex items-center justify-center gap-4">
<div class="px-4 py-2 bg-surface-container-low rounded-lg flex items-center gap-2">
<span class="font-label font-bold text-primary">Score: 11</span>
</div>
<div class="px-4 py-2 bg-secondary-container/20 rounded-lg flex items-center gap-2">
<span class="text-secondary">🔥</span>
<span class="font-label font-bold text-secondary">5 streak</span>
</div>
</div>
</div>
<!-- Input Box -->
<div class="w-full max-w-[280px] h-24 bg-surface-container-lowest rounded-xl shadow-[0_8px_24px_rgba(162,55,96,0.06)] border-b-4 border-primary-container flex items-center justify-center">
<span class="font-arcade text-5xl font-black text-primary">56</span>
<span class="w-1 h-12 bg-primary/20 ml-2 animate-pulse"></span>
</div>
</div>
<!-- Numpad Grid -->
<div class="w-full grid grid-cols-3 gap-4 pb-4">
<!-- Row 1 -->
<button class="pressable-btn h-16 bg-surface-container-lowest rounded-xl flex items-center justify-center shadow-[0_4px_0_#e8e0e3] hover:bg-surface-bright">
<span class="font-arcade text-2xl font-bold text-on-surface">1</span>
</button>
<button class="pressable-btn h-16 bg-surface-container-lowest rounded-xl flex items-center justify-center shadow-[0_4px_0_#e8e0e3] hover:bg-surface-bright">
<span class="font-arcade text-2xl font-bold text-on-surface">2</span>
</button>
<button class="pressable-btn h-16 bg-surface-container-lowest rounded-xl flex items-center justify-center shadow-[0_4px_0_#e8e0e3] hover:bg-surface-bright">
<span class="font-arcade text-2xl font-bold text-on-surface">3</span>
</button>
<!-- Row 2 -->
<button class="pressable-btn h-16 bg-surface-container-lowest rounded-xl flex items-center justify-center shadow-[0_4px_0_#e8e0e3] hover:bg-surface-bright">
<span class="font-arcade text-2xl font-bold text-on-surface">4</span>
</button>
<button class="pressable-btn h-16 bg-surface-container-lowest rounded-xl flex items-center justify-center shadow-[0_4px_0_#e8e0e3] hover:bg-surface-bright">
<span class="font-arcade text-2xl font-bold text-on-surface">5</span>
</button>
<button class="pressable-btn h-16 bg-surface-container-lowest rounded-xl flex items-center justify-center shadow-[0_4px_0_#e8e0e3] hover:bg-surface-bright">
<span class="font-arcade text-2xl font-bold text-on-surface">6</span>
</button>
<!-- Row 3 -->
<button class="pressable-btn h-16 bg-surface-container-lowest rounded-xl flex items-center justify-center shadow-[0_4px_0_#e8e0e3] hover:bg-surface-bright">
<span class="font-arcade text-2xl font-bold text-on-surface">7</span>
</button>
<button class="pressable-btn h-16 bg-surface-container-lowest rounded-xl flex items-center justify-center shadow-[0_4px_0_#e8e0e3] hover:bg-surface-bright">
<span class="font-arcade text-2xl font-bold text-on-surface">8</span>
</button>
<button class="pressable-btn h-16 bg-surface-container-lowest rounded-xl flex items-center justify-center shadow-[0_4px_0_#e8e0e3] hover:bg-surface-bright">
<span class="font-arcade text-2xl font-bold text-on-surface">9</span>
</button>
<!-- Row 4 -->
<button class="pressable-btn h-16 bg-surface-container-low rounded-xl flex items-center justify-center shadow-[0_4px_0_#e8e0e3] hover:bg-surface-container-high text-primary">
<span class="material-symbols-outlined">backspace</span>
</button>
<button class="pressable-btn h-16 bg-surface-container-lowest rounded-xl flex items-center justify-center shadow-[0_4px_0_#e8e0e3] hover:bg-surface-bright">
<span class="font-arcade text-2xl font-bold text-on-surface">0</span>
</button>
<button class="pressable-btn h-16 bg-primary-container/20 rounded-xl flex items-center justify-center shadow-[0_4px_0_#dbc0c6] hover:bg-primary-container/30 text-primary">
<span class="font-arcade text-xl font-black">C</span>
</button>
</div>
<!-- Enter Action -->
<div class="w-full pt-2">
<button class="pressable-btn w-full h-16 bg-gradient-to-br from-primary to-primary-container text-white rounded-xl font-headline font-bold text-lg flex items-center justify-center gap-2 shadow-[0_4px_0_#77133f]">
                SUBMIT ANSWER
                <span class="material-symbols-outlined">keyboard_return</span>
</button>
</div>
</main>
<!-- Floating Decor (Bubble Nodes Style) -->
<div class="fixed -bottom-12 -left-12 w-48 h-48 bg-tertiary-fixed opacity-10 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed -top-12 -right-12 w-64 h-64 bg-primary-fixed opacity-10 rounded-full blur-3xl pointer-events-none"></div>
</body></html>
