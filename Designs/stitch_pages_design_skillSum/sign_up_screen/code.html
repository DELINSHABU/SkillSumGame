<!DOCTYPE html>

<style>
        .dot-grid {
            background-image: radial-gradient(circle, #dbc0c6 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.15;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .btn-press:active {
            transform: translateY(2px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background font-body text-on-surface min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-[#fff7fa] dark:bg-slate-950 flex items-center justify-center px-6 py-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#a23760] dark:text-[#ff80ab] text-3xl" data-icon="videogame_asset">videogame_asset</span>
<span class="font-['Plus_Jakarta_Sans'] font-black text-2xl tracking-tighter text-[#a23760] dark:text-[#ff80ab]">SkillSum 2.0</span>
</div>
</header>
<main class="relative w-full max-w-md px-6 pt-8 pb-32 flex flex-col items-center">
<!-- Background Decoration -->
<div class="fixed inset-0 dot-grid -z-10"></div>
<!-- Hero Section -->
<div class="text-center mb-10 w-full">
<h1 class="font-headline text-4xl font-extrabold text-primary tracking-tight mb-2">Start Your Journey</h1>
<p class="text-on-surface-variant text-lg">Level up your potential in the arcade of growth.</p>
</div>
<!-- Signup Card -->
<div class="w-full bg-surface-container-lowest rounded-xl p-8 shadow-[0_24px_48px_-12px_rgba(162,55,96,0.06)] relative overflow-hidden">
<!-- Decorative Bubble -->
<div class="absolute -top-12 -right-12 w-32 h-32 bg-primary-container/20 rounded-full blur-3xl"></div>
<form class="space-y-6 relative z-10">
<!-- Name Field -->
<div class="space-y-2">
<label class="font-label text-sm uppercase tracking-widest text-primary font-bold ml-2">Full Name</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/40 group-focus-within:text-primary transition-colors" data-icon="person">person</span>
<input class="w-full bg-surface-container-low border-none rounded-lg py-4 pl-12 pr-4 focus:ring-4 focus:ring-primary-container/30 transition-all font-body text-on-surface placeholder:text-on-surface-variant/40" placeholder="Enter your name" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label text-sm uppercase tracking-widest text-primary font-bold ml-2">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/40 group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
<input class="w-full bg-surface-container-low border-none rounded-lg py-4 pl-12 pr-4 focus:ring-4 focus:ring-primary-container/30 transition-all font-body text-on-surface placeholder:text-on-surface-variant/40" placeholder="hello@skillsum.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="font-label text-sm uppercase tracking-widest text-primary font-bold ml-2">Secret Code</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/40 group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-low border-none rounded-lg py-4 pl-12 pr-4 focus:ring-4 focus:ring-primary-container/30 transition-all font-body text-on-surface placeholder:text-on-surface-variant/40" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- 3D Sign Up Button -->
<div class="pt-4">
<button class="btn-press group relative w-full bg-gradient-to-br from-primary to-primary-container text-white font-headline font-extrabold text-xl py-5 rounded-xl shadow-[0_4px_0_#77133f] transition-all hover:brightness-105 active:shadow-none active:translate-y-1">
                        Sign Up
                    </button>
</div>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 my-8">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="font-label text-xs font-bold text-on-surface-variant/50 uppercase tracking-widest">Or Continue With</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<!-- Social Button -->
<button class="w-full flex items-center justify-center gap-3 bg-white py-4 rounded-xl border border-outline-variant/20 shadow-sm hover:bg-surface-container-low transition-colors font-semibold text-on-surface">
<img alt="Google Logo" class="w-6 h-6" data-alt="Official Google G logo with clean white background for social authentication button" src="https://lh3.googleusercontent.com/aida-public/AB6AXuARBaWMbUwnVIf9vAUzMOcHBaXaePEVSiyoxcXFhIE7zUUBxyutefSmegzgNH1ykuauHx7eR-wJvLNc3cXiGGAucliYTS9Au_hoDe9dJjr0mYe6rgS5leEU5TAlSZZ0-vYmmneLrCxAF3SG8bVjoZe8N_LZ9My0MDZHcjtYNSW8J4_TNnD49JT4-ZLoiqXbZTZO_zF4povFPirr8KdUioAAdI0POleSO7KEYt4I3Fbi69BHWObvvd957EUwuZXUMFBUxKsFYeocnUUU"/>
                Google
            </button>
</div>
<!-- Footer Link -->
<div class="mt-8 text-center">
<p class="text-on-surface-variant">
                Already have an account? 
                <a class="text-primary font-bold hover:underline decoration-primary-container decoration-2 underline-offset-4" href="#">Log in</a>
</p>
</div>
<!-- Bottom Decoration Image -->
</main>
<!-- Bottom Navigation Mockup (Suppressed for transactional screen based on JSON rules, but placeholder for layout integrity if needed) -->
</body></html>
